<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Asselas">
<meta name="theme-color" content="#0b0c10">
<link rel="apple-touch-icon" href="/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="manifest" href="/manifest.json">
<title>Asselas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; -moz-user-select: none; user-select: none;
    -webkit-touch-callout: none; /* 關閉 iOS 長按跳出的複製/查詢選單，避免跟拖曳手勢打架 */
  }
  input, textarea {
    -webkit-user-select: text; -moz-user-select: text; user-select: text;
    -webkit-touch-callout: default;
  }
  html, body {
    background: #0b0c10; color: #e8eaed;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", sans-serif;
    overscroll-behavior: none;
  }
  body { display: flex; justify-content: center; }
  #app {
    width: 100%; max-width: 393px; /* iPhone 16 邏輯寬度 */
    min-height: 100vh; position: relative;
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-bottom: calc(28px + env(safe-area-inset-bottom));
  }
  .wrap { padding: 0 16px; }               /* 左右安全邊距 */
  .topbar {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 30px 16px 18px;
  }
  .eyebrow { font-size: 11px; letter-spacing: 3px; color: #6b7280; margin-bottom: 8px; }
  .networth { font-size: 40px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -1px; }
  .subline { font-size: 12px; color: #5b616e; margin-top: 4px; }
  .price-status-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .price-status { font-size: 11px; color: #5b616e; }
  .refresh-btn { width: 24px; height: 24px; border-radius: 7px; border: 1px solid #23252e; background: #16181f; color: #8a94a6; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
  .refresh-btn:active { background: #1c1e26; }
  .refresh-btn.spinning svg { animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .addbtn {
    width: 44px; height: 44px; border-radius: 50%; border: none;
    background: #5b8def; color: #fff; font-size: 26px; font-weight: 300;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(91,141,239,.4); margin-top: 4px; flex-shrink: 0;
  }
  .addbtn:active { transform: scale(.92); }

  #treemap { position: relative; width: 100%; height: 420px; padding: 0 8px; }
  #treemap-inner { position: relative; width: 100%; height: 100%; }
  .tile {
    position: absolute; padding: 3.5px; cursor: pointer;
    touch-action: none; /* 完全交由 JS 判斷：快滑=手動捲動頁面、按住不動=拿起方塊，避免跟瀏覽器原生滑動搶手勢 */
    transition: left .55s cubic-bezier(.34,1.15,.4,1), top .55s cubic-bezier(.34,1.15,.4,1),
                width .55s cubic-bezier(.34,1.15,.4,1), height .55s cubic-bezier(.34,1.15,.4,1);
  }
  .tile.dragging {
    touch-action: none;
    cursor: grabbing;
  }
  .tile.dragging .tile-inner {
    box-shadow: 0 14px 34px rgba(0,0,0,.45) !important;
    transform: scale(1.045);
  }
  .tile-inner {
    width: 100%; height: 100%; border-radius: 14px;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 12px; overflow: hidden; transition: box-shadow .3s, transform .15s ease;
  }
  .tile-name { font-weight: 700; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.28); text-align: left;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tile-pct { font-weight: 800; color: #fff; font-variant-numeric: tabular-nums; text-shadow: 0 1px 3px rgba(0,0,0,.28); text-align: left; }
  .tile-val { color: rgba(255,255,255,.85); font-variant-numeric: tabular-nums; text-align: left; }

  .section-label { font-size: 11px; letter-spacing: 2px; color: #6b7280; margin: 4px 0 12px; }
  .mode-btn {
    display: flex; align-items: center; gap: 5px;
    border: 1px solid #23252e; background: #16181f; color: #6b7280;
    border-radius: 20px; padding: 5px 11px 5px 9px; font-size: 11px; letter-spacing: 0.5px;
    cursor: pointer; transition: all .15s;
  }
  .mode-btn.on { border-color: #5b8def; background: #5b8def22; color: #a9c3f5; }
  .mode-btn:active { transform: scale(.95); }
  .legend-group { margin-bottom: 16px; }
  .legend-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
  .g-name-row { display: flex; align-items: center; gap: 8px; }
  .theme-dot { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,.25); cursor: pointer; padding: 0; }
  .theme-dot:active { transform: scale(.9); }
  .theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 4px 0 6px; }
  .theme-swatch { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; padding: 8px 4px; border-radius: 12px; border: 1.5px solid transparent; }
  .theme-swatch.on { border-color: #ffffff55; background: #ffffff0c; }
  .theme-swatch-strip { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(2,1fr); }
  .theme-swatch-strip span { display: block; }
  .theme-swatch-label { font-size: 12px; color: #a7adb8; }
  .color-swatch-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 4px 0 14px; }
  .color-swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; padding: 0; }
  .color-swatch.on { border-color: #fff; }
  .color-swatch:active { transform: scale(.92); }
  .target-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
  .target-btn { display: flex; align-items: center; gap: 8px; border: 1.5px solid #23252e; background: #16181f; color: #a7adb8; border-radius: 12px; padding: 9px 13px; font-size: 14px; cursor: pointer; transition: all .12s; }
  .target-btn:active { transform: scale(.96); }
  .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 4px; }
  .day-btn { aspect-ratio: 1; border: 1.5px solid #23252e; background: #16181f; color: #a7adb8; border-radius: 9px; font-size: 13px; font-variant-numeric: tabular-nums; cursor: pointer; transition: all .12s; }
  .day-btn.on { border-color: #5b8def; background: #5b8def33; color: #fff; font-weight: 700; }
  .day-btn:active { transform: scale(.92); }
  .legend-head .g-name { font-size: 12px; color: #6b7280; letter-spacing: 1px; }
  .legend-head .g-val { font-size: 12px; color: #8a94a6; font-variant-numeric: tabular-nums; }
  .legend-items { display: flex; flex-wrap: wrap; gap: 8px 16px; }
  .legend-item { display: flex; align-items: center; gap: 7px; cursor: pointer; }
  .swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .legend-item .li-name { font-size: 13px; color: #a7adb8; }
  .legend-item .li-qty { font-size: 11px; color: #5b616e; }

  /* 折線圖 */
  .chart-card { margin: 8px 16px 0; padding: 18px 16px 12px; background: #101218; border-radius: 18px; border: 1px solid #1a1c23; }
  .chart-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
  .chart-title { font-size: 13px; color: #a7adb8; font-weight: 600; }
  .chart-range { font-size: 11px; color: #5b616e; }
  #sparkline { width: 100%; height: 120px; display: block; }

  /* 底部彈出面板 */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex;
    align-items: flex-end; justify-content: center; z-index: 50; animation: fade .25s ease; }
  .sheet {
    width: 100%; max-width: 393px; background: #16181f; border-radius: 24px 24px 0 0;
    padding: 10px 20px calc(30px + env(safe-area-inset-bottom));
    animation: slideUp .32s cubic-bezier(.34,1.2,.4,1); max-height: 88vh; overflow-y: auto;
  }
  .grabber { width: 40px; height: 4px; background: #3a3d47; border-radius: 2px; margin: 0 auto 20px; }
  .sheet-asset-head { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
  .sheet-asset-head .sa-name { font-size: 19px; font-weight: 700; }
  .sheet-asset-head .sa-sub { font-size: 13px; color: #6b7280; }
  .dir-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .seg-row { display: flex; gap: 6px; background: #101218; border-radius: 12px; padding: 4px; margin-bottom: 18px; }
  .seg-btn { flex: 1; border: none; border-radius: 9px; padding: 10px 0; font-size: 14px; font-weight: 600; cursor: pointer; background: transparent; color: #6b7280; transition: all .15s; }
  .seg-btn.on { background: #2a2d38; color: #fff; }
  .dir-btn { flex: 1; border: none; border-radius: 11px; padding: 11px 0; font-size: 15px; font-weight: 700; cursor: pointer; background: #22242d; color: #6b7280; transition: all .15s; }
  .dir-btn.add.on { background: #3fb07a; color: #fff; }
  .dir-btn.sub.on { background: #e8804a; color: #fff; }
  .big-input { width: 100%; background: #0e0f13; border-radius: 13px; padding: 15px 16px; color: #fff;
    font-size: 24px; font-weight: 700; outline: none; font-variant-numeric: tabular-nums; }
  .quick-row { display: flex; gap: 8px; margin: 14px 0 4px; }
  .quick-btn { flex: 1; border: 1.5px solid #2a2d38; background: #1c1e26; color: #a7adb8; border-radius: 10px; padding: 9px 0; font-size: 13px; font-weight: 600; cursor: pointer; }
  .primary-btn { width: 100%; border: none; border-radius: 14px; padding: 16px 0; font-size: 17px; font-weight: 700; cursor: pointer; transition: all .15s; margin-top: 18px; }
  .primary-btn:disabled { background: #23252e !important; color: #555b66 !important; cursor: not-allowed; }

  .sheet-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .sheet-desc { font-size: 13px; color: #6b7280; margin-bottom: 20px; }
  .cat-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
  .cat-btn { flex: 1 1 calc(50% - 4px); min-width: 80px; border: 1.5px solid #23252e; background: #1c1e26; color: #a7adb8; border-radius: 12px; padding: 14px 0; font-size: 14px; font-weight: 700; cursor: pointer; transition: all .15s; }
  .field { margin-bottom: 14px; }
  .field-label { font-size: 12px; color: #6b7280; margin-bottom: 6px; }
  .sm-input { width: 100%; background: #0e0f13; border: 1.5px solid #2a2d38; border-radius: 11px; padding: 12px 14px; color: #fff; font-size: 16px; font-weight: 600; outline: none; font-variant-numeric: tabular-nums; }
  .row2 { display: flex; gap: 10px; }
  .note-sm { font-size: 11px; color: #5b616e; margin: 2px 0 8px; }
  .expand-note { animation: fadeIn .3s ease; }
  .del-btn { width: 100%; border: 1.5px solid #3a2020; background: transparent; color: #d9645a; border-radius: 12px; padding: 12px 0; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; }

  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div>
      <div class="eyebrow">淨資產 TWD</div>
      <div class="networth" id="networth">0</div>
      <div class="subline" id="subline"></div>
      <div class="price-status-row">
        <span class="price-status" id="priceStatus">—</span>
        <button class="refresh-btn" id="refreshBtn" title="更新即時價">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        </button>
      </div>
    </div>
    <button class="addbtn" id="addBtn">+</button>
  </div>

  <div id="treemap"><div id="treemap-inner"></div></div>

  <div class="wrap">
    <div class="section-label" style="display:flex;align-items:center;justify-content:space-between">
      <span>組成</span>
      <button class="mode-btn" id="freeModeBtn" title="自由排列：關閉同類別限制">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
        <span>自由排列</span>
      </button>
    </div>
    <div id="legend"></div>
  </div>

  <div class="chart-card">
    <div class="chart-head">
      <span class="chart-title">資產變化</span>
      <span class="chart-range" id="chartRange">近期</span>
    </div>
    <svg id="sparkline" viewBox="0 0 340 120" preserveAspectRatio="none"></svg>
  </div>
</div>

<script>
// ── 類別定義 ──
// 8 組精選主題色系，每組 6 階漸層。類別套用某個主題後，
// 底下資產的顏色就從該主題的 6 階裡分配（不管是自動配色還是手動選色都限定在這個範圍內）。
const THEMES = {
  green:  { label:"綠", shades:["#a1edc9","#6de3ac","#3ad98f","#22b470","#1c925b","#156f45"] },
  orange: { label:"橘", shades:["#f8c496","#f5a35c","#f18322","#c9650d","#a3520a","#7d3e08"] },
  purple: { label:"紫", shades:["#c49fef","#a46ae7","#8435de","#661eb8","#531895","#3f1372"] },
  blue:   { label:"藍", shades:["#9bbdf3","#6599ec","#2e74e5","#1858bf","#13479a","#0f3676"] },
  teal:   { label:"青", shades:["#a0eee6","#6ce5d9","#38dccb","#20b6a7","#1a9387","#147167"] },
  red:    { label:"紅", shades:["#eda1ad","#e36d81","#d93a55","#b4223b","#921c2f","#6f1524"] },
  gold:   { label:"金", shades:["#f3d89b","#ecc365","#e5ae2e","#bf8d18","#9a7213","#76570f"] },
  slate:  { label:"灰", shades:["#c0c5ce","#9ea5b3","#7c8598","#5e6778","#4c5361","#3a404a"] },
};
const THEME_ORDER = ["green","orange","purple","blue","teal","red","gold","slate"];

const CATEGORIES = {
  cash:     { label: "銀行帳戶", unit: "",   qtyLabel: "",       priceLabel: "",             theme: "green" },
  crypto:   { label: "虛擬貨幣", unit: "顆", qtyLabel: "持有數量", priceLabel: "現價 (TWD/顆)",   theme: "orange" },
  stock_tw: { label: "台股",     unit: "股", qtyLabel: "持有股數", priceLabel: "股價 (TWD/股)",   theme: "blue" },
  stock_us: { label: "美股",     unit: "股", qtyLabel: "持有股數", priceLabel: "股價 (TWD/股，可先概估)", theme: "red" },
};
// 取得某類別目前主題的調色盤（6 階色階陣列）
function getPalette(cat) { return THEMES[CATEGORIES[cat]?.theme || "green"].shades; }

const GROUP_ORDER = ["cash","crypto","stock_tw","stock_us"];
const OTHER_COLOR = "#4b515c";
const THRESHOLD = 0.03; // 3% 以下併入「其他」

// 幣種代號 → CoinGecko id（抓即時價用；新增幣種若不在表內會嘗試用小寫代號）
const COINGECKO_IDS = {
  BTC:"bitcoin", ETH:"ethereum", USDT:"tether", USDC:"usd-coin",
  SOL:"solana", BNB:"binancecoin", XRP:"ripple", ADA:"cardano",
  DOGE:"dogecoin", TRX:"tron", DOT:"polkadot", MATIC:"matic-network",
  LINK:"chainlink", AVAX:"avalanche-2", SHIB:"shiba-inu", LTC:"litecoin",
  UNI:"uniswap", ATOM:"cosmos", XLM:"stellar", NEAR:"near",
  APT:"aptos", ARB:"arbitrum", OP:"optimism", PEPE:"pepe",
  SUI:"sui", TON:"the-open-network", BCH:"bitcoin-cash"
};

let assets = [
  { id:"line",  cat:"cash",   name:"Line Bank",  color:"#3ad98f", balance:250000, order:0 },
  { id:"chang", cat:"cash",   name:"彰銀",       color:"#22b470", balance:132300, order:1 },
  { id:"btc",   cat:"crypto", name:"比特幣",     color:"#f18322", qty:0.04201, symbol:"BTC",  price:1996000, order:0 },
  { id:"eth",   cat:"crypto", name:"以太幣",     color:"#a46ae7", qty:0.1588,  symbol:"ETH",  price:56000, order:1 },
  { id:"tw50",  cat:"stock_tw",  name:"元大台灣50", color:"#2e74e5", qty:175,     symbol:"0050", price:108, order:0 },
];

// 淨資產歷史（每次變動記一點）
let history = [];

// ─────────────────────────────────────────────────────────
// Supabase 雲端同步設定
// 回來後：在 supabase.com 建專案 → Settings → API 複製這兩個值貼進來
// 兩個值都留空時 = 純本地模式（資料只存這個瀏覽器分頁，重整就沒了）
// ─────────────────────────────────────────────────────────
const SUPABASE_URL = "https://pxqgvscxapyovydofzlt.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4cWd2c2N4YXB5b3Z5ZG9memx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NjYxNzUsImV4cCI6MjA5OTM0MjE3NX0.oaIeXe3LmE-4sGG3Ntjsjv8bBN2j2XAIgx-FDwqASF0";

let sb = null;
const cloudOn = () => SUPABASE_URL && SUPABASE_ANON_KEY && sb;

function initSupabase() {
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) return;
  try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
  catch(e) { console.warn("Supabase 初始化失敗:", e.message); }
}

// 從雲端載入資產（若有）
async function loadFromCloud() {
  if (!cloudOn()) return false;
  try {
    const { data, error } = await sb.from("assets").select("*").order("created_at",{ascending:true});
    if (error) throw error;
    if (data && data.length) {
      // 雲端已經有資料：以雲端為準（多裝置同步的正常情況）
      assets = data.map((r,i) => ({
        id: r.id, cat: r.cat, name: r.name, color: r.color,
        order: r.sort_order!=null ? Number(r.sort_order) : i,
        ...(r.cat==="cash" ? { balance: Number(r.balance)||0 }
                           : { qty: Number(r.qty)||0, price: Number(r.price)||0, symbol: r.symbol||"" })
      }));
    } else {
      // 雲端是空的（第一次啟用同步）：把目前本機的資產「種」進雲端，
      // 避免之後任何一筆變動只存單一資產、其餘資產從沒上雲、被誤判成「只剩一筆」。
      for (const a of assets) { await saveAssetToCloud(a); }
    }
    return true;
  } catch(e) { console.warn("雲端載入失敗:", e.message); return false; }
}

// 把單一資產寫回雲端（upsert）
async function saveAssetToCloud(a) {
  if (!cloudOn()) return;
  try {
    await sb.from("assets").upsert({
      id: a.id, cat: a.cat, name: a.name, color: a.color,
      balance: a.cat==="cash" ? a.balance : null,
      qty: a.cat!=="cash" ? a.qty : null,
      price: a.cat!=="cash" ? a.price : null,
      symbol: a.symbol || null,
      sort_order: a.order ?? 0
    });
  } catch(e) { console.warn("雲端儲存失敗:", e.message); }
}

async function deleteAssetFromCloud(id) {
  if (!cloudOn()) return;
  try { await sb.from("assets").delete().eq("id", id); }
  catch(e) { console.warn("雲端刪除失敗:", e.message); }
}

// 淨值歷史：存一筆快照到雲端（供折線圖跨裝置同步）
async function saveNetWorthSnapshot(value) {
  if (!cloudOn()) return;
  try { await sb.from("net_worth_history").insert({ value }); }
  catch(e) { console.warn("歷史快照儲存失敗:", e.message); }
}

// 讀近 24 個月的淨值歷史（供月折線圖）
async function loadNetWorthHistory() {
  if (!cloudOn()) return false;
  try {
    const since = new Date();
    since.setMonth(since.getMonth() - 24);
    const { data, error } = await sb.from("net_worth_history")
      .select("value,created_at")
      .gte("created_at", since.toISOString())
      .order("created_at", { ascending: true })
      .limit(5000);
    if (error) throw error;
    if (data && data.length) {
      history = data.map(r => ({ v: Number(r.value), t: new Date(r.created_at).getTime() }));
    }
    return true;
  } catch(e) { console.warn("歷史載入失敗:", e.message); return false; }
}

// 手動排版結構（拖曳決定的橫排/直排）存回雲端

// 原子性搶佔某條規則「某一天」的執行權：用條件式更新（只有 last_run_date 還不是這天時才准許改成這天），
// 讓 Supabase 自己保證不會有兩邊（Cron 和開 App 補跑）同時搶到、重複扣款。
// 回傳 true = 搶到了、可以真的去扣款；false = 搶輸了（已經被執行過），這次直接放棄。
async function claimRecurringRule(rule, dateString) {

  } catch(e) { console.warn("定期定額搶佔失敗:", e.message); return false; }

const nf = n => Math.round(n).toLocaleString();

// 精準量測文字實際渲染寬度（用真實內容+字重+字級去量，不用猜的固定門檻）
const _measureCtx = document.createElement("canvas").getContext("2d");
function textWidth(text, weight, size) {
  _measureCtx.font = `${weight} ${size}px -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", sans-serif`;
  return _measureCtx.measureText(text).width;
}
const valueOf = a => a.cat === "cash" ? a.balance : a.qty * a.price;
const netWorth = () => assets.reduce((s,a)=>s+valueOf(a),0);

// ── squarified treemap ──
// preserveOrder=true 時不依數值重新排序，改用呼叫端給的順序（讓手動拖曳排序生效）
function layoutTreemap(items, x, y, w, h, preserveOrder=false) {
  const total = items.reduce((s,it)=>s+it.value,0);
  if (total <= 0 || w <= 0 || h <= 0) return [];
  const nodes = [];
  let area = {x,y,w,h};
  let remaining = preserveOrder ? [...items] : [...items].sort((a,b)=>b.value-a.value);
  let remTotal = total;
  while (remaining.length) {
    const horizontal = area.w >= area.h;
    const side = horizontal ? area.h : area.w;
    let row=[], rowVal=0, best=Infinity;
    for (let i=0;i<remaining.length;i++){
      const testVal = rowVal + remaining[i].value;
      const rowArea = (testVal/remTotal)*area.w*area.h;
      const rowLen = rowArea/side;
      let worst=0;
      [...row,remaining[i]].forEach(it=>{
        const itLen=(it.value/testVal)*rowLen;
        worst=Math.max(worst,Math.max(rowLen/itLen,itLen/rowLen));
      });
      if (worst<=best){best=worst;row=[...row,remaining[i]];rowVal=testVal;}
      else break;
    }
    const rowArea=(rowVal/remTotal)*area.w*area.h;
    const rowLen=rowArea/side;
    let off=0;
    row.forEach(it=>{
      const itLen=(it.value/rowVal)*side;
      if(horizontal) nodes.push({...it,x:area.x,y:area.y+off,w:rowLen,h:itLen});
      else nodes.push({...it,x:area.x+off,y:area.y,w:itLen,h:rowLen});
      off+=itLen;
    });
    if(horizontal){area.x+=rowLen;area.w-=rowLen;}
    else{area.y+=rowLen;area.h-=rowLen;}
    remTotal-=rowVal;
    remaining=remaining.slice(row.length);
  }
  return nodes;
}

// 小於門檻的資產併成「其他」，再兩層分群佈局
function buildDisplayItems() {
  const nw = netWorth();
  const big = [], small = [];
  assets.forEach(a => {
    if (valueOf(a)/nw < THRESHOLD) small.push(a);
    else big.push(a);
  });
  return { big, small, nw };
}

// ── 手動列陣佈局（取代單純依數值的 squarified，讓拖曳能決定橫排/直排）──
// categoryLayout[cat] = [[assetId,...], [assetId,...], ...]：一個 array 代表一「列」，
// 列內的資產左右並排（橫排），列與列之間上下堆疊（直排）。
// 面積仍照數值比例分配：列高 ∝ 該列數值總和，列內每項寬度 ∝ 該項數值 / 該列總和。
let categoryLayout = {};

function layoutRows(rows, x, y, w, h) {
  const rowAssetsList = rows.map(row => row.map(id => assets.find(a=>a.id===id)).filter(Boolean));
  const totalValue = rowAssetsList.reduce((s,list)=>s+list.reduce((s2,a)=>s2+valueOf(a),0),0);
  if (totalValue<=0) return [];
  const nodes = [];
  let curY = y;
  rowAssetsList.forEach(rowAssets => {
    const rowValue = rowAssets.reduce((s,a)=>s+valueOf(a),0);
    if (rowValue<=0) return;
    const rowH = h * (rowValue/totalValue);
    let curX = x;
    rowAssets.forEach(a => {
      const v = valueOf(a);
      const itemW = w * (v/rowValue);
      nodes.push({ id:a.id, value:v, ref:a, x:curX, y:curY, w:itemW, h:rowH });
      curX += itemW;
    });
    curY += rowH;
  });
  return nodes;
}

// 讓某類別的 rows 結構跟目前該類別實際顯示的資產同步（新增的資產自動補成新的一列、
// 刪除或被併入「其他」的資產自動移除）。回傳是否有結構變動（供決定要不要存回雲端）。
function ensureCategoryLayout(cat, ids) {
  if (!categoryLayout[cat]) categoryLayout[cat] = [];
  const rows = categoryLayout[cat];
  let changed = false;
  for (let i=rows.length-1; i>=0; i--) {
    const filtered = rows[i].filter(id => ids.includes(id));
    if (filtered.length !== rows[i].length) { rows[i]=filtered; changed=true; }
    if (rows[i].length===0) { rows.splice(i,1); changed=true; }
  }
  const present = new Set(rows.flat());
  ids.forEach(id => { if (!present.has(id)) { rows.push([id]); present.add(id); changed=true; } });
  return changed;
}

function healCategoryLayouts(bigList) {
  GROUP_ORDER.forEach(cat => {
    const idsForCat = bigList.filter(a=>a.cat===cat).map(a=>a.id);
    if (ensureCategoryLayout(cat, idsForCat)) saveCategoryLayout(cat);
  });
}

// 自由排列模式：關閉後不再限制「同類別才能排在一起」，所有資產可以自由跟任何資產排在同一排
let freeMode = false;
try { freeMode = localStorage.getItem("assel_freeMode") === "1"; } catch(e) {}

// 拖曳/存版面時要用的 key：自由模式下大家共用同一份 "__free__" 版面，否則各類別各自一份
function layoutKey(a) { return freeMode ? "__free__" : a.cat; }

function layoutGrouped(w, h) {
  const { big, small } = buildDisplayItems();
  const smallVal = small.reduce((s,a)=>s+valueOf(a),0);

  if (freeMode) {
    // 自由模式：所有資產（不分類別）混在同一份 rows 結構裡，僅跟「其他」分開兩區
    if (ensureCategoryLayout("__free__", big.map(a=>a.id))) saveCategoryLayout("__free__");
    const groups = [];
    const bigVal = big.reduce((s,a)=>s+valueOf(a),0);
    if (bigVal>0) groups.push({ key:"__free__", value:bigVal, other:false });
    if (smallVal>0) groups.push({ key:"__other__", list:small, value:smallVal, other:true });

    const gNodes = layoutTreemap(groups, 0,0,w,h);
    let all=[];
    gNodes.forEach(gn=>{
      if (gn.other) {
        all.push({ id:"__other__", value:gn.value, ref:{ id:"__other__", name:"其他", color:OTHER_COLOR, isOther:true, members:gn.list },
          x:gn.x, y:gn.y, w:gn.w, h:gn.h });
      } else {
        const inner = layoutRows(categoryLayout["__free__"] || [], gn.x, gn.y, gn.w, gn.h);
        all = all.concat(inner);
      }
    });
    return all;
  }

  healCategoryLayouts(big);
  // 分群：各 cat 一區，額外一個 "其他" 區（若有 small）
  const groups = [];
  GROUP_ORDER.forEach(cat => {
    const list = big.filter(a=>a.cat===cat);
    const value = list.reduce((s,a)=>s+valueOf(a),0);
    if (value>0) groups.push({ key:cat, list, value, other:false });
  });
  if (smallVal>0) groups.push({ key:"__other__", list:small, value:smallVal, other:true });

  const gNodes = layoutTreemap(groups.map(g=>({...g,value:g.value})), 0,0,w,h);
  let all=[];
  gNodes.forEach(gn=>{
    if (gn.other) {
      // 其他整區當成一塊（不加額外 padding，縫隙統一由 tile 的 gap 控制）
      all.push({ id:"__other__", value:gn.value, ref:{ id:"__other__", name:"其他", color:OTHER_COLOR, isOther:true, members:gn.list },
        x:gn.x, y:gn.y, w:gn.w, h:gn.h });
    } else {
      // 群組層不加 padding，直接依使用者手動排列的 rows 結構佈局
      const inner = layoutRows(categoryLayout[gn.key] || [], gn.x, gn.y, gn.w, gn.h);
      all=all.concat(inner);
    }
  });
  return all;
}

// ── 渲染 treemap ──
let animatedNW = netWorth();
let lastNodes = []; // 上一次渲染的方塊位置，供拖曳時判斷「拖到哪個方塊上」
let draggingId = null; // 目前正在被拖曳的資產 id（null=沒有在拖）

function renderTreemap() {
  const inner = document.getElementById("treemap-inner");
  const rect = inner.getBoundingClientRect();
  const W = rect.width, H = rect.height;
  const nodes = layoutGrouped(W, H);
  lastNodes = nodes;
  const nw = netWorth();
  const existing = {};
  inner.querySelectorAll(".tile").forEach(el => existing[el.dataset.id] = el);
  const seen = new Set();

  nodes.forEach(n => {
    const a = n.ref;
    seen.add(n.id);
    const pct = (n.value/nw)*100;

    // 依方塊「形狀」決定排版，兩種模式都用實際量測文字所需空間來判斷（不用猜的固定門檻）：
    // 1. 先測「直向大字」模式（名稱在上、比例+金額往下疊）真正需要多少寬高
    // 2. 直向放不下，再測「橫向排版」（名稱靠左、數字靠右）真正需要多寬
    // 3. 兩種都放不下，才降級到依面積分級、砍資訊顯示
    const nameStr = a.isOther ? "其他" : a.name;
    const pctStr = pct.toFixed(1) + "%";
    const valStr = nf(n.value);

    // 直向模式的字級（跟下面 L3 實際渲染用的字級要一致，量測才準）
    const nameSizeCol = a.isOther ? 13 : 16;
    const pctSizeCol = 21;
    const valSizeCol = 11;
    const nameWCol = textWidth(nameStr, 700, nameSizeCol);
    const pctWCol = textWidth(pctStr, 800, pctSizeCol);
    const valWCol = textWidth(valStr, 600, valSizeCol);
    // 直向模式寬度：取三行裡最寬的那個 + 左右內距(12px*2)
    const colNeededW = Math.max(nameWCol, pctWCol, valWCol) + 24;
    // 直向模式高度：三行文字實際佔的高度（字級×行高）加總 + 上下內距(11px*2)
    const colNeededH = (nameSizeCol*1.15) + (pctSizeCol*1.1) + (valSizeCol*1.2) + 22;
    const qualifiesColumnL3 = n.w >= colNeededW && n.h >= colNeededH;

    // 橫向排版的字級與量測（跟下面 wideShort 實際渲染用的字級一致）
    const nameSizeRow = a.isOther ? 14 : 16;
    const pctSizeRow = a.isOther ? 15 : 19;
    const nameW = textWidth(nameStr, 700, nameSizeRow);
    const pctW = textWidth(pctStr, 800, pctSizeRow);
    const valW = textWidth(valStr, 600, 11.5);
    const rightColW = Math.max(pctW, valW); // 金額疊在比例下方，寬度取兩者較大值
    const rowNeededW = nameW + 10 /*名稱與數字間距*/ + rightColW + 32 /*左右內距*/;

    // 直向測過，放不下才測橫向；兩者都放不下才降級
    const wideShort = !qualifiesColumnL3 && n.w >= rowNeededW && n.h >= 34;
    const rowShowVal = wideShort && n.h >= 46; // 高度也夠兩行時，橫向排版才連金額一起顯示

    const level = (qualifiesColumnL3 || wideShort) ? null :
      (n.w>=56 && n.h>=42) ? 2 :
      (n.w>=40 && n.h>=26) ? 1 : 0;

    let el = existing[n.id];
    if (!el) {
      el = document.createElement("div");
      el.className="tile"; el.dataset.id=n.id;
      el.innerHTML = `<div class="tile-inner"><div class="tile-name"></div><div class="tile-bottom"><div class="tile-pct"></div><div class="tile-val"></div></div></div>`;
      attachTileInteraction(el, a);
      inner.appendChild(el);
    }
    // 正在被拖曳的方塊：位置由拖曳手勢直接控制，渲染迴圈不覆蓋 left/top，避免打架
    if (n.id !== draggingId) {
      el.style.left=n.x+"px"; el.style.top=n.y+"px";
    }
    el.style.width=n.w+"px"; el.style.height=n.h+"px";

    const innerEl = el.querySelector(".tile-inner");
    innerEl.style.background = a.isOther ? "#22252d" : `linear-gradient(145deg, ${a.color}, ${a.color}c4)`;
    innerEl.style.boxShadow = `0 3px 14px ${a.color}2e`;

    const nameEl=el.querySelector(".tile-name");
    const bottom=el.querySelector(".tile-bottom");
    const pctEl=el.querySelector(".tile-pct");
    const valEl=el.querySelector(".tile-val");

    if (wideShort) {
      // 橫向排版：名稱在左、比例+金額在右（金額疊在比例下方、靠右對齊），充分利用寬度
      innerEl.style.flexDirection = "row";
      innerEl.style.alignItems = "center";
      innerEl.style.justifyContent = "space-between";
      innerEl.style.padding = "0 16px";

      nameEl.style.display="block";
      nameEl.textContent = nameStr;
      nameEl.style.fontSize = nameSizeRow+"px";
      nameEl.style.lineHeight = "1.15";
      nameEl.style.color = a.isOther ? "#c8ccd4" : "#fff";
      nameEl.style.flex = "1 1 auto";
      nameEl.style.minWidth = "0"; // 讓 ellipsis 在橫向排版下也能正常截斷

      bottom.style.display = "flex";
      bottom.style.flexDirection = "column";
      bottom.style.alignItems = "flex-end"; // 數字靠右對齊，跟左邊名稱區隔開
      bottom.style.flex = "0 0 auto";
      bottom.style.marginLeft = "10px";

      pctEl.textContent = pctStr;
      pctEl.style.fontSize = pctSizeRow+"px";
      pctEl.style.lineHeight = "1.1";
      pctEl.style.color = a.isOther?"#c8ccd4":"#fff";
      pctEl.style.textAlign = "right";

      valEl.style.display = rowShowVal ? "block" : "none";
      valEl.textContent = valStr;
      valEl.style.fontSize = "11.5px";
      valEl.style.lineHeight = "1.2";
      valEl.style.color = a.isOther?"#8a94a6":"rgba(255,255,255,.85)";
      valEl.style.textAlign = "right";

    } else if (qualifiesColumnL3) {
      // 直向大字：名稱在上、比例+金額往下疊，實測放得下才會走這條分支
      innerEl.style.flexDirection = "column";
      innerEl.style.alignItems = ""; // 重要：橫排模式(wideShort)會把這個設成 center，
                                      // 這裡若不重設，殘留值在直向排版下會變成「水平置中」，就是文字跑到中間的成因
      innerEl.style.justifyContent = "space-between";
      innerEl.style.padding = "11px 12px";
      bottom.style.display = "block";
      bottom.style.flexDirection = "";
      bottom.style.alignItems = "";
      bottom.style.marginLeft = "";
      bottom.style.width = "100%";

      nameEl.style.display="block";
      nameEl.textContent = nameStr;
      nameEl.style.fontSize = nameSizeCol+"px";
      nameEl.style.lineHeight = "1.15";
      nameEl.style.color = a.isOther ? "#c8ccd4" : "#fff";
      nameEl.style.flex = "";
      nameEl.style.minWidth = "";
      nameEl.style.width = "100%";

      pctEl.textContent = pctStr;
      pctEl.style.fontSize = pctSizeCol+"px";
      pctEl.style.lineHeight = "1.1";
      pctEl.style.color = a.isOther?"#c8ccd4":"#fff";
      pctEl.style.textAlign = "left";
      pctEl.style.width = "100%";

      valEl.style.display = "block";
      valEl.textContent = valStr;
      valEl.style.fontSize = valSizeCol+"px";
      valEl.style.lineHeight = "1.2";
      valEl.style.color = a.isOther?"#8a94a6":"rgba(255,255,255,.85)";
      valEl.style.textAlign = "left";
      valEl.style.width = "100%";

    } else {
      // 直向降級：兩種模式都放不下，才依面積分級、砍資訊顯示（level 只會是 2/1/0）
      innerEl.style.flexDirection = "column";
      innerEl.style.alignItems = ""; // 同上，避免殘留 center 造成文字置中
      innerEl.style.justifyContent = "center";
      innerEl.style.padding = level<=1 ? "6px 7px" : "11px 12px";
      bottom.style.display = "block";
      bottom.style.flexDirection = "";
      bottom.style.alignItems = "";
      bottom.style.marginLeft = "";
      bottom.style.width = "100%";

      nameEl.style.display="none";

      // 比例：所有降級等級都顯示（核心資訊）
      pctEl.textContent = pct.toFixed(1)+"%";
      pctEl.style.fontSize = (level===2?16 : level===1?13 : 10)+"px";
      pctEl.style.lineHeight = "1.1";
      pctEl.style.color = a.isOther?"#c8ccd4":"#fff";
      pctEl.style.textAlign = "left";
      pctEl.style.width = "100%";

      // 金額：L2 顯示，更小就砍
      valEl.style.display = level>=2 ? "block" : "none";
      valEl.textContent = nf(n.value);
      valEl.style.fontSize = "10px";
      valEl.style.lineHeight = "1.2";
      valEl.style.color = a.isOther?"#8a94a6":"rgba(255,255,255,.85)";
      valEl.style.textAlign = "left";
      valEl.style.width = "100%";
    }
  });
  // 移除消失的
  Object.keys(existing).forEach(id=>{ if(!seen.has(id)) existing[id].remove(); });
}

// ── 方塊互動：輕點 = 開啟調整面板；長按 0.32s 後拖曳 = 調整同類別內的顯示順序 ──
// 拖曳時其他方塊會依 squarified treemap 重新計算、平滑流動讓位（既有的 CSS transition 負責這段動畫）
const LONG_PRESS_MS = 320;
const MOVE_CANCEL_PX = 10; // 長按計時器觸發前，手指移動超過這個距離視為滑動頁面，取消拖曳

// ── 全域共用的拖曳狀態：整個 App 從頭到尾只有「一組」pointermove/pointerup 監聽器，
// 不是每個方塊各自臨時掛一套。原本「按下才掛、放開才拆」的做法，若手機瀏覽器偶爾
// 沒確實觸發 pointerup/pointercancel（快速滑動、被系統手勢打斷等），殘留的監聽器
// 拆不掉，多組疊加執行就會讓畫面滑動時抖動。改成固定一組監聽器＋共用狀態物件後，
// 不管有沒有確實觸發收尾，都不會有「監聽器疊加」的問題。
let dragState = null; // null = 目前沒有任何方塊在被按住/拖曳

function resetDragState() {
  if (dragState) {
    clearTimeout(dragState.timer);
    dragState.el.classList.remove("dragging");
    dragState.el.style.zIndex = "";
    dragState.el.style.transition = "";
  }
  draggingId = null;
  dragState = null;
}

// 把資產從目前列陣結構中移除，再依「意圖」插入：
// mode='row'：插進目標的同一排（橫排並列）；mode='newrow'：在目標排的上/下方插入新的一排（直排堆疊）
function applyIntent(cat, assetId, intent) {
  const rows = categoryLayout[cat];
  if (!rows) return;
  for (let i=rows.length-1;i>=0;i--) {
    const idx = rows[i].indexOf(assetId);
    if (idx>=0) { rows[i].splice(idx,1); if (rows[i].length===0) rows.splice(i,1); break; }
  }
  let targetRow=-1, targetCol=-1;
  for (let i=0;i<rows.length;i++){ const idx=rows[i].indexOf(intent.targetId); if(idx>=0){targetRow=i;targetCol=idx;break;} }
  if (targetRow===-1) { rows.push([assetId]); return; }
  if (intent.mode==="row") {
    const insertAt = intent.before ? targetCol : targetCol+1;
    rows[targetRow].splice(insertAt, 0, assetId);
  } else {
    const newRowIdx = intent.before ? targetRow : targetRow+1;
    rows.splice(newRowIdx, 0, [assetId]);
  }
}

function globalPointerMove(e) {
  if (!dragState) return;
  const { el, assetRef } = dragState;
  const a = assets.find(x=>x.id===assetRef.id);
  if (!a) { resetDragState(); return; }

  if (!dragState.dragActive) {
    const dx0 = e.clientX-dragState.startX, dy0=e.clientY-dragState.startY;
    if (!dragState.scrolling) {
      // 移動還在無反應區內：完全不做任何事（不捲動、不取消長按計時），
      // 避免手拿著手機的自然手震被誤判成「要捲動」而讓畫面抖動
      if (Math.hypot(dx0,dy0) > MOVE_CANCEL_PX) {
        clearTimeout(dragState.timer); dragState.timer=null;
        dragState.scrolling = true;
        dragState.lastY = e.clientY; // 從超過門檻的這一刻開始才手動捲動，之後跟手捲動
      }
      return;
    }
    // 已確定是滑動意圖：手動捲動頁面（.tile 關閉了瀏覽器原生手勢，改由這裡接手）
    e.preventDefault();
    const dyFrame = e.clientY - dragState.lastY;
    dragState.lastY = e.clientY;
    window.scrollBy(0, -dyFrame);
    return;
  }

  e.preventDefault();
  const dx = e.clientX-dragState.startX, dy = e.clientY-dragState.startY;
  const newLeft = dragState.startLeft+dx, newTop = dragState.startTop+dy;
  el.style.left = newLeft+"px";
  el.style.top = newTop+"px";

  // 用拖曳方塊的中心點，判斷目前疊在哪個方塊上
  // 自由模式（freeMode）下不限制類別；否則只在同類別內判定
  // 這裡刻意用「拿起來那一刻」凍結的 hitW/hitH，不用即時 DOM 尺寸，
  // 否則方塊視覺變形會回頭影響判定、判定又觸發變形，形成抖動的回饋迴圈
  const cx = newLeft + dragState.hitW/2, cy = newTop + dragState.hitH/2;
  const hovered = lastNodes.find(n =>
    n.id !== assetRef.id && n.ref && !n.ref.isOther && (freeMode || n.ref.cat === a.cat) &&
    cx >= n.x && cx <= n.x+n.w && cy >= n.y && cy <= n.y+n.h
  );
  if (!hovered) return;

  // 判斷落點在目標方塊的哪個象限：離左右邊近 → 橫排插入同一排；離上下邊近 → 直排插入新的一排
  const relX = (cx - hovered.x) / hovered.w;
  const relY = (cy - hovered.y) / hovered.h;
  const distX = Math.min(relX, 1-relX);
  const distY = Math.min(relY, 1-relY);
  const intent = distX < distY
    ? { mode:"row",    targetId: hovered.id, before: relX < 0.5 }
    : { mode:"newrow", targetId: hovered.id, before: relY < 0.5 };
  const key = `${intent.mode}:${intent.targetId}:${intent.before}`;
  if (key === dragState.lastIntentKey) return;
  dragState.lastIntentKey = key;

  applyIntent(layoutKey(a), a.id, intent);
  dragState.layoutTouched = true;
  renderTreemap(); // 其他方塊依新結構平滑重新排列、讓位；拖曳中的方塊也會跟著變形（見 dragging 的 transition 設定）
}

function globalPointerUp() {
  if (!dragState) return;
  const { el, assetRef, dragActive, layoutTouched } = dragState;

  if (!dragActive) {
    // 沒有觸發拖曳（快速輕點）：視為一般點擊，開啟調整面板
    clearTimeout(dragState.timer);
    dragState = null;
    if (assetRef.isOther) {
      // 「其他」方塊每次渲染都會產生全新的 members 清單，這裡的 assetRef 是建立當下綁定的閉包、
      // 可能是舊資料；改成即時去 lastNodes（每次渲染都會更新）撈最新的一份，避免點開內容過期
      const latest = lastNodes.find(n=>n.id==="__other__");
      openOtherSheet(latest ? latest.ref : assetRef);
    } else {
      openAdjust(assetRef.id);
    }
    return;
  }

  const key = layoutKey(assetRef);
  resetDragState();
  renderTreemap(); // 放開後，讓拖曳方塊也平滑歸位到最終計算出的格子（含形狀）
  if (layoutTouched) saveCategoryLayout(key);
}

// App 從頭到尾只掛這一套，永遠不拆卸
window.addEventListener("pointermove", globalPointerMove, { passive:false });
window.addEventListener("pointerup", globalPointerUp);
window.addEventListener("pointercancel", globalPointerUp);
// 保險：分頁切到背景、視窗失焦時強制清空，避免任何邊界情況卡住殘留狀態
window.addEventListener("blur", resetDragState);
document.addEventListener("visibilitychange", ()=>{ if (document.hidden) resetDragState(); });

function attachTileInteraction(el, assetRef) {
  el.addEventListener("pointerdown", (e) => {
    if (e.button !== undefined && e.button !== 0) return; // 只回應主要按鍵/單指
    if (dragState) return; // 已經有其他方塊正在處理中（理論上不會發生，多一層保險）

    dragState = {
      el, assetRef,
      startX: e.clientX, startY: e.clientY,
      lastY: e.clientY, // 用來算「這一格」垂直移動量，手動捲動頁面用
      startLeft: parseFloat(el.style.left)||0,
      startTop: parseFloat(el.style.top)||0,
      dragActive: false,
      scrolling: false, // 是否已確認這次手勢是「捲動頁面」
      hitW: 0, hitH: 0, // 判定用的固定尺寸（拿起來那一刻凍結）
      lastIntentKey: null,
      layoutTouched: false, // 這次拖曳是否真的改動了版面結構
      timer: null,
    };

    dragState.timer = setTimeout(() => {
      if (!dragState || dragState.el !== el) return; // 這期間已經放開或換了別的方塊，作廢
      if (assetRef.isOther) { dragState = null; return; } // 「其他」聚合方塊不支援拖曳
      dragState.dragActive = true;
      draggingId = assetRef.id;
      dragState.hitW = parseFloat(el.style.width)||0;
      dragState.hitH = parseFloat(el.style.height)||0;
      el.classList.add("dragging");
      el.style.zIndex = "40";
      // 位置(left/top)不放進 transition，才能精準跟著手指；
      // 但把 width/height 放進去，讓拖曳中的方塊「視覺上」能隨版面變化平滑變形（純視覺，不影響判定）
      el.style.transition = "width .22s ease, height .22s ease, box-shadow .2s ease, transform .15s ease";
    }, LONG_PRESS_MS);
  });
}

// ── 淨資產數字動畫 ──
function animateNetWorth(to) {
  const from = animatedNW, dur=550, t0=performance.now();
  const el=document.getElementById("networth");
  function tick(t){
    const p=Math.min((t-t0)/dur,1);
    const e=1-Math.pow(1-p,3);
    el.textContent=nf(from+(to-from)*e);
    if(p<1) requestAnimationFrame(tick); else animatedNW=to;
  }
  requestAnimationFrame(tick);
}

// ── 圖例 ──
function renderLegend() {
  const box=document.getElementById("legend");
  box.innerHTML="";
  GROUP_ORDER.forEach(cat=>{
    const list=assets.filter(a=>a.cat===cat);
    if(!list.length) return;
    const gv=list.reduce((s,a)=>s+valueOf(a),0);
    const g=document.createElement("div"); g.className="legend-group";
    g.innerHTML=`<div class="legend-head">
      <span class="g-name-row">
        <button class="theme-dot" data-cat="${cat}" title="更換 ${CATEGORIES[cat].label} 主題色" style="background:${getPalette(cat)[0]}"></button>
        <span class="g-name">${CATEGORIES[cat].label}</span>
      </span>
      <span class="g-val">${nf(gv)}</span>
    </div>`;
    g.querySelector(".theme-dot").addEventListener("click", ()=>openThemePicker(cat));
    const items=document.createElement("div"); items.className="legend-items";
    list.forEach(a=>{
      const it=document.createElement("div"); it.className="legend-item";
      it.innerHTML=`<span class="swatch" style="background:${a.color}"></span><span class="li-name">${a.name}</span>${a.cat!=="cash"?`<span class="li-qty">${a.qty}${CATEGORIES[a.cat].unit}</span>`:""}`;
      it.addEventListener("click",()=>openAdjust(a.id));
      items.appendChild(it);
    });
    g.appendChild(items); box.appendChild(g);
  });
}

// ── 折線圖：近 24 個月，月度聚合 + 平滑曲線 ──

// 把逐筆變動紀錄聚合成「近 24 個月，每月一個點」
// 規則：每月取「當月最後一筆」的淨值；該月沒有變動就沿用前一個有資料的月份（forward-fill）
//      24 個月內完全沒有任何歷史資料的月份，往前抓不到值時，用「當前淨值」墊底
function buildMonthlySeries() {
  const now = new Date();
  const months = [];
  for (let i = 23; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({ y: d.getFullYear(), m: d.getMonth(), label: `${d.getFullYear()}/${d.getMonth()+1}` });
  }
  // 依時間排序，準備逐月掃描
  const sorted = [...history].sort((a,b) => a.t - b.t);
  let idx = 0;
  let lastVal = sorted.length ? sorted[0].v : netWorth();
  const series = months.map(mo => {
    const monthEndTime = new Date(mo.y, mo.m + 1, 1).getTime() - 1; // 該月最後一毫秒
    // 把所有落在這個月（含）之前、還沒用過的點都吃進來，取最後一筆當代表
    while (idx < sorted.length && sorted[idx].t <= monthEndTime) {
      lastVal = sorted[idx].v;
      idx++;
    }
    return { ...mo, v: lastVal };
  });
  // 最後一個月（本月）用「當前即時淨值」覆蓋，讓線的終點永遠反映最新狀態
  if (series.length) series[series.length-1].v = netWorth();
  return series;
}

// Catmull-Rom → 平滑貝茲曲線路徑，讓折線圖絲滑不生硬
function smoothPath(pts) {
  if (pts.length < 2) return "";
  if (pts.length === 2) return `M${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)} L${pts[1][0].toFixed(1)} ${pts[1][1].toFixed(1)}`;
  let d = `M${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[i === 0 ? 0 : i - 1];
    const p1 = pts[i];
    const p2 = pts[i + 1];
    const p3 = pts[i + 2 < pts.length ? i + 2 : i + 1];
    const c1x = p1[0] + (p2[0] - p0[0]) / 6;
    const c1y = p1[1] + (p2[1] - p0[1]) / 6;
    const c2x = p2[0] - (p3[0] - p1[0]) / 6;
    const c2y = p2[1] - (p3[1] - p1[1]) / 6;
    d += ` C${c1x.toFixed(1)} ${c1y.toFixed(1)} ${c2x.toFixed(1)} ${c2y.toFixed(1)} ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;
  }
  return d;
}

function renderChart() {
  const svg=document.getElementById("sparkline");
  const W=340,H=120,pad=10;

  if (history.length===0) {
    svg.innerHTML=`<text x="${W/2}" y="${H/2}" fill="#4b515c" font-size="12" text-anchor="middle">調整資產後這裡會顯示走勢</text>`;
    document.getElementById("chartRange").textContent="—";
    return;
  }

  const series = buildMonthlySeries();
  const vals = series.map(s=>s.v);
  const min=Math.min(...vals), max=Math.max(...vals);
  const range=max-min||1;
  const n = series.length;
  const pts = series.map((s,i)=>{
    const x = pad + (i/(n-1)) * (W - pad*2);
    const y = pad + (1-(s.v-min)/range) * (H - pad*2);
    return [x,y];
  });

  const line = smoothPath(pts);
  const last = pts[pts.length-1];
  const area = line + ` L${last[0].toFixed(1)} ${H-pad} L${pts[0][0].toFixed(1)} ${H-pad} Z`;
  const up = vals[vals.length-1] >= vals[0];
  const col = up ? "#3fb07a" : "#e8804a";

  svg.innerHTML=`
    <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#grad)"/>
    <path d="${line}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
      stroke-dasharray="800" stroke-dashoffset="800">
      <animate attributeName="stroke-dashoffset" from="800" to="0" dur=".9s" fill="freeze" calcMode="spline" keySplines="0.34 0.8 0.4 1" keyTimes="0;1"/>
    </path>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="4" fill="${col}">
      <animate attributeName="r" values="0;5;4" dur=".6s" begin=".5s" fill="freeze"/>
    </circle>`;
  document.getElementById("chartRange").textContent = `${series[0].label} – ${series[n-1].label}`;
}

function pushHistory() {
  history.push({ v: netWorth(), t: Date.now() });
  // 不再限制筆數：雲端可能已載入近 24 個月的完整資料，
  // 若砍掉最舊的點會讓月折線圖前段月份失真。
}

// 資料變動後統一呼叫：記歷史 + 存雲端 + 關面板 + 重繪
async function commit(changedAsset, opts={}) {
  pushHistory();
  // 等雲端真的存完才關視窗/繼續，避免使用者存完立刻鎖螢幕、切走，
  // 導致背景中的網路請求被中斷、資料根本沒送到雲端（這是之前「新增資產後重開就不見」的成因）
  const tasks = [];
  if (changedAsset && !opts.deleted) tasks.push(withTimeout(saveAssetToCloud(changedAsset), 10000, "資產儲存"));
  if (opts.deleted && changedAsset) tasks.push(withTimeout(deleteAssetFromCloud(changedAsset.id), 10000, "資產刪除"));
  tasks.push(withTimeout(saveNetWorthSnapshot(netWorth()), 10000, "淨值快照")); // 雲端也記一筆淨值快照，供跨裝置折線圖
  await Promise.all(tasks);
  if (!opts.keepSheet) closeSheet();
  renderAll();
}

// 資產互轉專用：一次存兩邊資產（From 扣、To 加），只記一筆歷史快照，避免 commit() 呼叫兩次造成重複記錄
async function commitTransfer(fromAsset, toAsset) {
  pushHistory();
  const tasks = [
    withTimeout(saveAssetToCloud(fromAsset), 10000, "轉出來源"),
    withTimeout(saveAssetToCloud(toAsset), 10000, "轉出目標"),
    withTimeout(saveNetWorthSnapshot(netWorth()), 10000, "淨值快照"),
  ];
  await Promise.all(tasks);
  closeSheet();
  renderAll();
}

// ── 全部重繪 ──
function renderAll(animate=true) {
  renderTreemap(); renderLegend(); renderChart();
  const nw=netWorth();
  if(animate) animateNetWorth(nw); else { document.getElementById("networth").textContent=nf(nw); animatedNW=nw; }
  document.getElementById("subline").textContent = `${assets.length} 項資產`;
}

// ── 底部面板通用 ──
function showSheet(html, accent) {
  closeSheet();
  const ov=document.createElement("div"); ov.className="overlay"; ov.id="overlay";
  ov.innerHTML=`<div class="sheet" style="border-top:3px solid ${accent}"><div class="grabber"></div>${html}</div>`;
  ov.addEventListener("click",e=>{ if(e.target===ov) closeSheet(); });
  document.body.appendChild(ov);
  return ov.querySelector(".sheet");
}
function closeSheet(){ const o=document.getElementById("overlay"); if(o) o.remove(); }

// ── 調整資產（含編輯名稱、直接改值、快速增減）──
function openAdjust(id) {
  const a=assets.find(x=>x.id===id); if(!a) return;
  const isCash=a.cat==="cash";
  const unit=CATEGORIES[a.cat].unit;
  const sub = isCash?`目前 ${nf(a.balance)}`:`持有 ${a.qty} ${unit} · ${nf(valueOf(a))}`;
  let dir="add";

  const editFields = isCash
    ? `<div class="field"><div class="field-label">餘額</div>
         <input class="sm-input" id="eBal" type="number" inputmode="numeric" value="${a.balance}"></div>`
    : `<div class="field"><div class="field-label">代號</div>
         <input class="sm-input" id="eSym" value="${a.symbol||""}"></div>
       <div class="row2">
         <div class="field" style="flex:1"><div class="field-label">${CATEGORIES[a.cat].qtyLabel}</div>
           <input class="sm-input" id="eQty" type="number" inputmode="decimal" value="${a.qty}"></div>
         <div class="field" style="flex:1"><div class="field-label">${CATEGORIES[a.cat].priceLabel}</div>
           <input class="sm-input" id="ePrice" type="number" inputmode="decimal" value="${a.price}"></div>
       </div>`;

  const sheet=showSheet(`
    <div class="sheet-asset-head">
      <span class="swatch" style="width:16px;height:16px;border-radius:5px;background:${a.color}"></span>
      <div><div class="sa-name">${a.name}</div><div class="sa-sub">${sub}</div></div>
    </div>

    <div class="seg-row">
      <button class="seg-btn on" id="segQuick">快速增減</button>
      <button class="seg-btn" id="segEdit">編輯內容</button>
      <button class="seg-btn" id="segTransfer">轉出</button>
    </div>

    <div id="paneQuick">
      <div class="dir-row">
        <button class="dir-btn add on" id="dAdd">＋ 增加</button>
        <button class="dir-btn sub" id="dSub">－ 減少</button>
      </div>
      <input class="big-input" id="amt" type="number" inputmode="${isCash?"numeric":"decimal"}"
        placeholder="${isCash?"輸入金額":"輸入數量（"+unit+"）"}" style="border:1.5px solid ${a.color}66">
      ${isCash?`<div class="quick-row">${[1000,5000,10000,50000].map(q=>`<button class="quick-btn" data-q="${q}">${q/1000}k</button>`).join("")}</div>`:""}
      <button class="primary-btn" id="applyBtn" disabled style="background:${a.color};color:#fff">確認</button>
    </div>

    <div id="paneEdit" style="display:none">
      <div class="field"><div class="field-label">名稱</div>
        <input class="sm-input" id="eName" value="${a.name}"></div>
      ${editFields}
      <div class="field"><div class="field-label">顏色（${CATEGORIES[a.cat].label}色系）</div>
        <div class="color-swatch-row" id="colorRow">
          ${getPalette(a.cat).map(c=>`<button class="color-swatch ${c===a.color?'on':''}" data-color="${c}" style="background:${c}"></button>`).join("")}
        </div>
      </div>
      <button class="primary-btn" id="saveBtn" style="background:${a.color};color:#fff">儲存變更</button>
    </div>

    <div id="paneTransfer" style="display:none">
      <div class="field">
        <div class="field-label">從「${a.name}」轉出至</div>
        <div class="target-list" id="transferTargetList"></div>
        ${assets.length<=1?`<div class="note-sm">還沒有其他資產可以轉入，先新增一個吧</div>`:""}
      </div>
      <div class="field">
        <div class="field-label">從「${a.name}」扣除（${isCash?"金額":unit}）</div>
        <input class="sm-input" id="tFrom" type="number" inputmode="${isCash?"numeric":"decimal"}" placeholder="0">
      </div>
      <div class="field" id="tToField" style="display:none">
        <div class="field-label" id="tToLabel">轉入數量</div>
        <input class="sm-input" id="tTo" type="number" inputmode="decimal" placeholder="0">
      </div>
      <button class="primary-btn" id="transferBtn" disabled style="background:${a.color};color:#fff">確認轉出</button>
    </div>

    <button class="del-btn" id="delBtn">刪除此資產</button>
  `, a.color);

  let pendingColor = a.color;
  sheet.querySelectorAll("#colorRow .color-swatch").forEach(sw=>{
    sw.onclick = ()=>{
      sheet.querySelectorAll("#colorRow .color-swatch").forEach(s=>s.classList.remove("on"));
      sw.classList.add("on");
      pendingColor = sw.dataset.color;
    };
  });

  // 分頁切換（三分頁通用）
  const paneQuick=sheet.querySelector("#paneQuick");
  const paneEdit=sheet.querySelector("#paneEdit");
  const paneTransfer=sheet.querySelector("#paneTransfer");
  const segQuick=sheet.querySelector("#segQuick");
  const segEdit=sheet.querySelector("#segEdit");
  const segTransfer=sheet.querySelector("#segTransfer");
  const tabs = [["segQuick",segQuick,paneQuick], ["segEdit",segEdit,paneEdit], ["segTransfer",segTransfer,paneTransfer]];
  function switchTab(activeBtn) {
    tabs.forEach(([id,btn,pane])=>{
      const on = btn===activeBtn;
      btn.classList.toggle("on", on);
      pane.style.display = on ? "block" : "none";
    });
  }
  segQuick.onclick=()=>switchTab(segQuick);
  segEdit.onclick=()=>switchTab(segEdit);
  segTransfer.onclick=()=>switchTab(segTransfer);

  // ── 轉出：從這個資產扣一點、轉去另一個資產加一點，兩邊金額分別手動輸入 ──
  let transferTarget = null;
  const transferTargetList = sheet.querySelector("#transferTargetList");
  const tFrom = sheet.querySelector("#tFrom");
  const tTo = sheet.querySelector("#tTo");
  const tToField = sheet.querySelector("#tToField");
  const tToLabel = sheet.querySelector("#tToLabel");
  const transferBtn = sheet.querySelector("#transferBtn");

  assets.filter(x=>x.id!==id).forEach(other=>{
    const btn=document.createElement("button");
    btn.className="target-btn";
    btn.innerHTML=`<span class="swatch" style="background:${other.color}"></span><span>${other.name}</span>`;
    btn.onclick=()=>{
      transferTarget = other;
      transferTargetList.querySelectorAll(".target-btn").forEach(b=>{
        b.style.borderColor=""; b.style.background=""; b.style.color="";
      });
      btn.style.borderColor = other.color;
      btn.style.background = other.color+"22";
      btn.style.color = "#fff";
      const otherIsCash = other.cat==="cash";
      const otherUnit = otherIsCash ? "金額" : CATEGORIES[other.cat].unit;
      tToLabel.textContent = `轉入「${other.name}」數量（${otherUnit}）`;
      tTo.setAttribute("inputmode", otherIsCash ? "numeric" : "decimal");
      tToField.style.display = "block";
      checkTransferReady();
    };
    transferTargetList.appendChild(btn);
  });

  function checkTransferReady(){
    transferBtn.disabled = !(transferTarget && tFrom.value && Number(tFrom.value)>0 && tTo.value && Number(tTo.value)>0);
  }
  tFrom.oninput=()=>{ if(isCash) tFrom.value=tFrom.value.replace(/[^\d]/g,""); checkTransferReady(); };
  tTo.oninput=()=>{ checkTransferReady(); };

  transferBtn.onclick=async ()=>{
    const fromAmt=Number(tFrom.value), toAmt=Number(tTo.value);
    if(!transferTarget || !fromAmt || fromAmt<=0 || !toAmt || toAmt<=0) return;
    if(isCash) a.balance=Math.max(0,a.balance-fromAmt);
    else a.qty=Math.max(0,+(a.qty-fromAmt).toFixed(8));
    const tgt = transferTarget;
    if(tgt.cat==="cash") tgt.balance=(tgt.balance||0)+toAmt;
    else tgt.qty=+((tgt.qty||0)+toAmt).toFixed(8);
    transferBtn.disabled=true; transferBtn.textContent="轉出中…";
    await commitTransfer(a, tgt);
  };

  // ── 快速增減 ──
  const amt=sheet.querySelector("#amt");
  const applyBtn=sheet.querySelector("#applyBtn");
  const dAdd=sheet.querySelector("#dAdd"), dSub=sheet.querySelector("#dSub");
  const setDir=d=>{dir=d;dAdd.classList.toggle("on",d==="add");dSub.classList.toggle("on",d==="sub");updateLabel();};
  dAdd.onclick=()=>setDir("add"); dSub.onclick=()=>setDir("sub");
  function updateLabel(){ applyBtn.textContent=(dir==="add"?"增加":"減少")+(isCash?"":" "+unit); }
  amt.oninput=()=>{ if(isCash) amt.value=amt.value.replace(/[^\d]/g,""); applyBtn.disabled=!amt.value; };
  sheet.querySelectorAll(".quick-btn").forEach(b=>b.onclick=()=>{amt.value=b.dataset.q;applyBtn.disabled=false;});
  updateLabel();
  applyBtn.onclick=async ()=>{
    const v=Number(amt.value); if(!v||v<=0) return;
    const sign=dir==="add"?1:-1;
    if(isCash) a.balance=Math.max(0,a.balance+sign*v);
    else a.qty=Math.max(0,+(a.qty+sign*v).toFixed(8));
    applyBtn.disabled=true; applyBtn.textContent="儲存中…";
    await commit(a);
  };

  // ── 編輯內容（改名稱、直接設定值）──
  const saveBtnEl = sheet.querySelector("#saveBtn");
  saveBtnEl.onclick=async ()=>{
    const newName=sheet.querySelector("#eName").value.trim();
    if(newName) a.name=newName;
    if(isCash){
      const b=sheet.querySelector("#eBal").value;
      if(b!=="") a.balance=Math.max(0,Number(b));
    } else {
      const sym=sheet.querySelector("#eSym").value.trim();
      const q=sheet.querySelector("#eQty").value;
      const p=sheet.querySelector("#ePrice").value;
      if(sym) a.symbol=sym;
      if(q!=="") a.qty=Math.max(0,Number(q));
      if(p!=="") a.price=Math.max(0,Number(p));
    }
    a.color = pendingColor;
    saveBtnEl.disabled=true; saveBtnEl.textContent="儲存中…";
    await commit(a);
  };

  sheet.querySelector("#delBtn").onclick=async (e)=>{
    e.target.disabled=true; e.target.textContent="刪除中…";
    assets=assets.filter(x=>x.id!==id);
    await commit(a, {deleted:true});
  };
}

// ── 類別主題色：套用後，該類別底下所有資產依「原色階排名」對應到新主題的同排名色階 ──
async function applyCategoryTheme(cat, themeName) {
  const oldPalette = getPalette(cat);
  CATEGORIES[cat].theme = themeName;
  const newPalette = getPalette(cat);
  const changedAssets = [];
  assets.filter(a=>a.cat===cat).forEach(a=>{
    const idx = oldPalette.indexOf(a.color);
    // 只重新配色「用調色盤自動配色」的資產；曾手動選過調色盤以外顏色的（理論上不會發生，因為選色也限定在調色盤內）一律都在盤內，所以這裡一定找得到
    if (idx>=0 && newPalette[idx] !== a.color) { a.color = newPalette[idx]; changedAssets.push(a); }
  });
  renderAll();
  await saveCategoryLayout(cat);
  await Promise.all(changedAssets.map(a=>saveAssetToCloud(a)));
}

function openThemePicker(cat) {
  const current = CATEGORIES[cat].theme;
  const sheet = showSheet(`
    <div class="sheet-title">${CATEGORIES[cat].label} · 主題色</div>
    <div class="sheet-desc">套用後，這個類別底下的資產都會換成新色系</div>
    <div class="theme-grid">
      ${THEME_ORDER.map(t=>{
        const sh = THEMES[t].shades;
        return `<button class="theme-swatch ${t===current?'on':''}" data-theme="${t}">
          <span class="theme-swatch-strip">${sh.map(c=>`<span style="background:${c}"></span>`).join("")}</span>
          <span class="theme-swatch-label">${THEMES[t].label}</span>
        </button>`;
      }).join("")}
    </div>
  `, getPalette(cat)[0]);
  sheet.querySelectorAll(".theme-swatch").forEach(btn=>{
    btn.onclick = async ()=>{
      sheet.querySelectorAll(".theme-swatch").forEach(b=>b.classList.remove("on"));
      btn.classList.add("on");
      await applyCategoryTheme(cat, btn.dataset.theme);
      closeSheet();
    };
  });
}

// ── 新增資產 ──
function openAdd() {
  let cat=null;
  const sheet=showSheet(`
    <div class="sheet-title">新增資產</div>
    <div class="sheet-desc">先選類別，再填內容</div>
    <div class="cat-row">
      ${GROUP_ORDER.map(k=>`<button class="cat-btn" data-cat="${k}">${CATEGORIES[k].label}</button>`).join("")}
      <button class="cat-btn" data-cat="__recurring__">定期定額</button>
    </div>
    <div id="fields"></div>
  `, "#5b8def");

  const fields=sheet.querySelector("#fields");
  sheet.querySelectorAll(".cat-btn").forEach(b=>b.onclick=()=>{
    cat=b.dataset.cat;
    const pc = cat==="__recurring__" ? "#5b8def" : getPalette(cat)[0];
    sheet.querySelectorAll(".cat-btn").forEach(x=>{x.style.border="1.5px solid #23252e";x.style.background="#1c1e26";x.style.color="#a7adb8";});
    b.style.border=`1.5px solid ${pc}`; b.style.background=pc+"22"; b.style.color="#fff";
    if (cat==="__recurring__") renderRecurringPane(); else renderFields(cat);
  });

  function renderFields(cat) {
    const c=CATEGORIES[cat];
    const namePh = cat==="cash" ? "例：國泰世華" : cat==="crypto" ? "例：Solana" : cat==="stock_us" ? "例：Apple" : "例：台積電";
    const symPh = cat==="crypto" ? "例：SOL" : cat==="stock_us" ? "例：AAPL" : "例：2330";
    const qtyPh = cat==="crypto" ? "0.05" : "100";
    const pricePh = cat==="crypto" ? "6000000" : "1000";
    fields.innerHTML = `<div class="expand-note">
      <div class="field"><div class="field-label">名稱</div>
        <input class="sm-input" id="fName" placeholder="${namePh}"></div>
      ${cat==="cash"
        ? `<div class="field"><div class="field-label">初始金額</div><input class="sm-input" id="fBal" type="number" inputmode="numeric" placeholder="0"></div>`
        : `<div class="field"><div class="field-label">代號</div><input class="sm-input" id="fSym" placeholder="${symPh}"></div>
           <div class="row2">
             <div class="field" style="flex:1"><div class="field-label">${c.qtyLabel}</div><input class="sm-input" id="fQty" type="number" inputmode="decimal" placeholder="${qtyPh}"></div>
             <div class="field" style="flex:1"><div class="field-label">${c.priceLabel}</div><input class="sm-input" id="fPrice" type="number" inputmode="decimal" placeholder="${pricePh}"></div>
           </div>
           <div class="note-sm">＊之後接即時價 API 後價格會自動更新，你只要維護數量</div>`}
      <button class="primary-btn" id="addConfirm" disabled style="background:#5b8def;color:#fff">新增到資產</button>
    </div>`;

    const nameEl=fields.querySelector("#fName");
    const confirm=fields.querySelector("#addConfirm");
    const check=()=>{
      let ok=nameEl.value.trim();
      if(cat==="cash") ok=ok && fields.querySelector("#fBal").value!=="";
      else ok=ok && fields.querySelector("#fQty").value!=="" && fields.querySelector("#fPrice").value!=="";
      confirm.disabled=!ok;
    };
    fields.querySelectorAll("input").forEach(i=>i.oninput=check);
    nameEl.focus();
    confirm.onclick=async ()=>{
      const id="a"+Date.now();
      const used=assets.map(a=>a.color);
      const pal = getPalette(cat);
      const color=pal.find(c=>!used.includes(c))||pal[0];
      const sameCat = assets.filter(a=>a.cat===cat);
      const nextOrder = sameCat.length ? Math.max(...sameCat.map(a=>a.order??0)) + 1 : 0;
      if(cat==="cash"){
        assets.push({id,cat,name:nameEl.value.trim(),color,order:nextOrder,balance:Number(fields.querySelector("#fBal").value)});
      } else {
        assets.push({id,cat,name:nameEl.value.trim(),color,order:nextOrder,
          symbol:(fields.querySelector("#fSym").value||nameEl.value).trim(),
          qty:Number(fields.querySelector("#fQty").value),
          price:Number(fields.querySelector("#fPrice").value)});
      }
      const newA = assets[assets.length-1];
      confirm.disabled=true; confirm.textContent="新增中…";
      await commit(newA); // 等確實存進雲端才關視窗，避免存到一半被中斷、下次打開就不見
      // 幣種、股票新增後順手抓一次即時價
      if (cat==="crypto" || cat==="stock_tw" || cat==="stock_us") refreshPrices(true);
    };
  }

  // ── 定期定額：列出現有規則（可暫停/刪除）＋ 新增規則表單 ──
  function renderRecurringPane() {
    fields.innerHTML = `
      <div class="expand-note">
        <div class="sheet-desc" style="margin-top:-4px">到了設定的日期會自動從 A 轉一筆到 B（伺服器每天自動執行，開 App 時也會補跑一次沒執行到的，雙重保險）。買幣/股會用「執行當下的即時價」自動換算成買到幾顆/幾股，不用自己心算</div>
        <div id="ruleList"></div>
        <button class="primary-btn" id="newRuleBtn" style="background:#5b8def;margin-top:6px">＋ 新增規則</button>
        <div id="ruleForm" style="display:none; margin-top:16px;">
          <div class="field"><div class="field-label">從哪個資產扣</div><div class="target-list" id="ruleFromList"></div></div>
          <div class="field"><div class="field-label">轉去哪個資產</div><div class="target-list" id="ruleToList"></div></div>
          <div class="field"><div class="field-label">每月哪幾天執行（可複選）</div><div class="day-grid" id="dayGrid"></div></div>
          <div class="field"><div class="field-label" id="ruleAmtLabel">每次投入金額（台幣）</div><input class="sm-input" id="ruleAmt" type="number" inputmode="numeric" placeholder="0"></div>
          <div class="note-sm" id="ruleEstimate"></div>
          <button class="primary-btn" id="ruleSaveBtn" disabled style="background:#5b8def">儲存規則</button>
        </div>
      </div>
    `;

    const ruleListEl = fields.querySelector("#ruleList");
    const newRuleBtn = fields.querySelector("#newRuleBtn");
    const ruleForm = fields.querySelector("#ruleForm");
    const ruleFromList = fields.querySelector("#ruleFromList");
    const ruleToList = fields.querySelector("#ruleToList");
    const dayGrid = fields.querySelector("#dayGrid");
    const ruleAmt = fields.querySelector("#ruleAmt");
    const ruleAmtLabel = fields.querySelector("#ruleAmtLabel");
    const ruleEstimate = fields.querySelector("#ruleEstimate");
    const ruleSaveBtn = fields.querySelector("#ruleSaveBtn");

    let selFrom=null, selTo=null, selDays=new Set();

    function renderRuleList() {
      if (!recurringRules.length) {
        ruleListEl.innerHTML = `<div class="note-sm" style="margin-bottom:10px">還沒有設定任何定期定額規則</div>`;
        return;
      }
      ruleListEl.innerHTML = recurringRules.map(r=>{
        const from = assets.find(a=>a.id===r.from_id);
        const to = assets.find(a=>a.id===r.to_id);
        const fromName = from ? from.name : "(已刪除)";
        const toName = to ? to.name : "(已刪除)";
        const daysTxt = (r.days_of_month||[]).slice().sort((a,b)=>a-b).map(d=>d+"號").join("、");
        return `<div class="rule-item" data-id="${r.id}" style="border:1.5px solid #23252e;border-radius:12px;padding:12px 14px;margin-bottom:8px;${r.active?'':'opacity:.5'}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <span style="font-size:14px;font-weight:600;color:#e8eaed">${fromName} → ${toName}</span>
            <span style="font-size:11px;color:${r.active?'#3fb07a':'#6b7280'}">${r.active?'啟用中':'已暫停'}</span>
          </div>
          <div style="font-size:12px;color:#8a94a6">每月 ${daysTxt}・每次投入 ${nf(r.amount_twd)} 元（依執行當下即時價換算）</div>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="quick-btn rule-toggle" style="flex:1">${r.active?'暫停':'恢復'}</button>
            <button class="quick-btn rule-delete" style="flex:1;color:#d9645a">刪除</button>
          </div>
        </div>`;
      }).join("");

      ruleListEl.querySelectorAll(".rule-item").forEach(item=>{
        const id = item.dataset.id;
        const rule = recurringRules.find(r=>r.id===id);
        item.querySelector(".rule-toggle").onclick=async ()=>{
          rule.active = !rule.active;
          await saveRecurringRule(rule);
          renderRuleList();
        };
        item.querySelector(".rule-delete").onclick=async ()=>{
          recurringRules = recurringRules.filter(r=>r.id!==id);
          await deleteRecurringRule(id);
          renderRuleList();
        };
      });
    }
    renderRuleList();

    function buildAssetList(container, onPick) {
      container.innerHTML = "";
      assets.forEach(a=>{
        const btn=document.createElement("button");
        btn.className="target-btn";
        btn.innerHTML=`<span class="swatch" style="background:${a.color}"></span><span>${a.name}</span>`;
        btn.onclick=()=>{
          container.querySelectorAll(".target-btn").forEach(b=>{b.style.borderColor="";b.style.background="";b.style.color="";});
          btn.style.borderColor=a.color; btn.style.background=a.color+"22"; btn.style.color="#fff";
          onPick(a);
        };
        container.appendChild(btn);
      });
    }

    function buildDayGrid() {
      dayGrid.innerHTML = "";
      for (let d=1; d<=31; d++) {
        const btn=document.createElement("button");
        btn.type="button"; btn.className="day-btn"; btn.textContent=d;
        btn.onclick=()=>{
          if (selDays.has(d)) { selDays.delete(d); btn.classList.remove("on"); }
          else { selDays.add(d); btn.classList.add("on"); }
          check();
        };
        dayGrid.appendChild(btn);
      }
    }

    // 用資產「目前」的即時價，預覽這筆金額大概能換到多少（僅供參考，實際執行當天會用當時的即時價重新算）
    function updateEstimate() {
      if (!selFrom || !selTo || !ruleAmt.value) { ruleEstimate.textContent=""; return; }
      const amt = Number(ruleAmt.value);
      if (!amt || amt<=0) { ruleEstimate.textContent=""; return; }
      const fromUnitPrice = selFrom.cat==="cash" ? 1 : selFrom.price;
      const toUnitPrice = selTo.cat==="cash" ? 1 : selTo.price;
      if (!fromUnitPrice || !toUnitPrice) {
        ruleEstimate.textContent = "＊來源或目標還沒有即時價格，暫時無法預覽換算數量";
        return;
      }
      const fromUnit = selFrom.cat==="cash" ? "元" : CATEGORIES[selFrom.cat].unit;
      const toUnit = selTo.cat==="cash" ? "元" : CATEGORIES[selTo.cat].unit;
      const fromQty = amt/fromUnitPrice, toQty = amt/toUnitPrice;
      ruleEstimate.textContent = `以目前價格估算：扣約 ${fromQty.toFixed(fromUnitPrice===1?0:6)} ${fromUnit} → 買到約 ${toQty.toFixed(toUnitPrice===1?0:6)} ${toUnit}（實際以執行當天即時價為準）`;
    }

    function updateLabel() {
      ruleAmtLabel.textContent = "每次投入金額（台幣）";
    }

    function check() {
      ruleSaveBtn.disabled = !(selFrom && selTo && selFrom!==selTo && selDays.size>0 &&
        ruleAmt.value && Number(ruleAmt.value)>0);
      updateEstimate();
    }
    ruleAmt.oninput=check;

    newRuleBtn.onclick=()=>{
      const showing = ruleForm.style.display!=="none";
      if (showing) { ruleForm.style.display="none"; return; }
      selFrom=null; selTo=null; selDays=new Set();
      ruleAmt.value=""; ruleEstimate.textContent="";
      updateLabel();
      ruleForm.style.display="block";
      buildAssetList(ruleFromList, (a)=>{ selFrom=a; check(); });
      buildAssetList(ruleToList, (a)=>{ selTo=a; check(); });
      buildDayGrid();
      check();
    };

    ruleSaveBtn.onclick=async ()=>{
      const rule = {
        id: "r"+Date.now(),
        from_id: selFrom.id, to_id: selTo.id,
        amount_twd: Number(ruleAmt.value),
        days_of_month: Array.from(selDays).sort((a,b)=>a-b),
        active: true, last_run_date: null,
      };
      ruleSaveBtn.disabled=true; ruleSaveBtn.textContent="儲存中…";
      recurringRules.push(rule);
      await saveRecurringRule(rule);
      ruleForm.style.display="none";
      renderRuleList();
    };
  }
}

  updateFreeModeBtn();
  renderAll();
};

// ── 即時價 ──
// 幣價：CoinGecko 公開 API（免金鑰、直接回台幣、有開 CORS，前端可直接抓）
// 台股：透過 Vercel serverless（api/twstock.js）代理證交所即時 API，繞過瀏覽器跨域限制
// 美股：透過 Vercel serverless（api/usstock.js）代理 Stooq 即時報價，抓到的是美元，
//      這裡統一換算成台幣再存進 a.price（App 內部所有金額一律以台幣為準，跟其他類別一致）
const STOCK_API_READY = true;
const TWSTOCK_PROXY_URL = "/api/twstock";
const USSTOCK_PROXY_URL = "/api/usstock";

async function fetchCryptoPrices() {
  const cryptos = assets.filter(a => a.cat === "crypto");
  if (!cryptos.length) return { ok:0, fail:0, err:null };
  const idMap = {};
  cryptos.forEach(a => {
    const id = COINGECKO_IDS[(a.symbol||"").toUpperCase()] || (a.symbol||"").toLowerCase();
    if (!idMap[id]) idMap[id] = [];
    idMap[id].push(a);
  });
  const ids = Object.keys(idMap).join(",");

  // 依序嘗試多個來源，任一成功就用（回傳 { id: twdPrice }）
  const sources = [
    // 1) CoinGecko 直接回台幣
    async () => {
      const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${encodeURIComponent(ids)}&vs_currencies=twd`);
      if (!r.ok) throw new Error("CoinGecko HTTP "+r.status);
      const d = await r.json();
      const out = {};
      Object.keys(idMap).forEach(id => { if (d[id]&&d[id].twd) out[id]=d[id].twd; });
      if (!Object.keys(out).length) throw new Error("CoinGecko 無資料");
      return out;
    },
    // 2) CoinGecko 回美元，再用匯率換台幣（有時 twd 被限、usd 可通）
    async () => {
      const [pr, fx] = await Promise.all([
        fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${encodeURIComponent(ids)}&vs_currencies=usd`),
        fetch(`https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=twd`)
      ]);
      if (!pr.ok) throw new Error("CG-usd HTTP "+pr.status);
      const d = await pr.json();
      let usdtwd = 32; // 保底匯率
      try { const f = await fx.json(); if (f.tether&&f.tether.twd) usdtwd = f.tether.twd; } catch(e){}
      const out = {};
      Object.keys(idMap).forEach(id => { if (d[id]&&d[id].usd) out[id]=d[id].usd*usdtwd; });
      if (!Object.keys(out).length) throw new Error("CG-usd 無資料");
      return out;
    },
  ];

  let out=null, lastErr=null;
  for (const src of sources) {
    try { out = await src(); if (out) break; }
    catch(e) { lastErr = e; }
  }

  let ok=0, fail=0;
  if (out) {
    Object.entries(idMap).forEach(([id, list]) => {
      if (out[id]) { list.forEach(a => a.price = out[id]); ok += list.length; }
      else fail += list.length;
    });
  } else {
    fail = cryptos.length;
  }
  return { ok, fail, err: out ? null : (lastErr ? lastErr.message : "全部來源失敗") };
}

// 抓目前 USD/TWD 匯率：借用 CoinGecko 的 USDT 報價當代理（USDT 跟美元 1:1 掛鉤），
// 不用另外接一個匯率 API。抓失敗就用保底匯率 32，不會讓美股完全抓不到價。
async function getUsdTwdRate() {
  try {
    const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=twd");
    if (!r.ok) throw new Error("匯率來源 HTTP "+r.status);
    const d = await r.json();
    if (d.tether && d.tether.twd) return d.tether.twd;
  } catch(e) { console.warn("匯率抓取失敗，改用保底匯率:", e.message); }
  return 32;
}

async function fetchTWStockPrices() {
  if (!STOCK_API_READY) return { ok:0, fail:0, skipped:true, err:null };
  const stocks = assets.filter(a => a.cat === "stock_tw");
  if (!stocks.length) return { ok:0, fail:0, err:null };
  const codes = stocks.map(a => a.symbol).join(",");
  let ok=0, fail=0, err=null;
  try {
    const res = await fetch(`${TWSTOCK_PROXY_URL}?codes=${encodeURIComponent(codes)}`);
    if (!res.ok) throw new Error("代理 HTTP "+res.status);
    const data = await res.json(); // 預期格式：{ "0050": 108.25, ... }
    stocks.forEach(a => {
      if (data[a.symbol]) { a.price = data[a.symbol]; ok++; }
      else fail++;
    });
    if (fail>0 && ok===0) err = "證交所無回應資料（可能休市或代號錯誤）";
  } catch(e) {
    fail = stocks.length;
    err = e.message;
    console.warn("台股股價抓取失敗:", e.message);
  }
  return { ok, fail, err };
}

async function fetchUSStockPrices() {
  if (!STOCK_API_READY) return { ok:0, fail:0, skipped:true, err:null };
  const stocks = assets.filter(a => a.cat === "stock_us");
  if (!stocks.length) return { ok:0, fail:0, err:null };
  const codes = stocks.map(a => a.symbol).join(",");
  let ok=0, fail=0, err=null;
  try {
    const [res, usdtwd] = await Promise.all([
      fetch(`${USSTOCK_PROXY_URL}?codes=${encodeURIComponent(codes)}`),
      getUsdTwdRate(),
    ]);
    if (!res.ok) throw new Error("代理 HTTP "+res.status);
    const data = await res.json(); // 預期格式：{ "AAPL": 150.5, ... }（美元）
    stocks.forEach(a => {
      if (data[a.symbol]) { a.price = data[a.symbol] * usdtwd; ok++; } // 換算成台幣再存
      else fail++;
    });
    if (fail>0 && ok===0) err = "Stooq 無回應資料（可能休市或代號錯誤）";
  } catch(e) {
    fail = stocks.length;
    err = e.message;
    console.warn("美股股價抓取失敗:", e.message);
  }
  return { ok, fail, err };
}

let refreshing = false;
async function refreshPrices(silent=false) {
  if (refreshing) return;
  refreshing = true;
  const btn = document.getElementById("refreshBtn");
  if (btn) btn.classList.add("spinning");
  const status = document.getElementById("priceStatus");
  if (status && !silent) status.textContent = "更新價格中…";

  const [c, tw, us] = await Promise.all([fetchCryptoPrices(), fetchTWStockPrices(), fetchUSStockPrices()]);

  if (btn) btn.classList.remove("spinning");
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,"0");
  const mm = String(now.getMinutes()).padStart(2,"0");
  if (status) {
    const hasCrypto = assets.some(a => a.cat === "crypto");
    const hasStock = assets.some(a => a.cat === "stock_tw" || a.cat === "stock_us");
    const totalOk = c.ok + tw.ok + us.ok;
    const totalFail = c.fail + tw.fail + us.fail;
    const nothingToFetch = !hasCrypto && !hasStock;

    if (nothingToFetch) {
      status.textContent = `價格更新於 ${hh}:${mm}（尚無幣種或股票）`;
      status.style.color = "#5b616e";
    } else if (totalOk>0 && totalFail===0) {
      status.textContent = `價格更新於 ${hh}:${mm}`;
      status.style.color = "#5b616e";
    } else if (totalOk>0) {
      status.textContent = `已更新 ${totalOk} 項，${totalFail} 項失敗`;
      status.style.color = "#e8804a";
    } else {
      // 全失敗：顯示原因，多半是 file:// 開啟或被限流
      const reason = c.err && /Failed to fetch|NetworkError|CORS/i.test(c.err)
        ? "無法連線（可能是用檔案直接開啟，需用網址開啟）"
        : (c.err || tw.err || us.err || "抓取失敗");
      status.textContent = `價格更新失敗：${reason}`;
      status.style.color = "#e8804a";
    }
  }
  refreshing = false;
  renderAll();
}

// ── 初始化 ──
window.addEventListener("resize",()=>renderTreemap());

// 幫任何 Promise 加逾時保護：超過時間就當作失敗，不再無限等待
function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((resolve) => setTimeout(() => {
      console.warn(`${label} 逾時（${ms}ms），改用本地資料繼續`);
      resolve(false);
    }, ms))
  ]);
}

// YYYY-MM-DD 格式（本地時區），用來跟 last_run_date 比對
function dateStr(d) {
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), dd=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}
function addDays(d, n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }

// 執行一次定期定額的單一次扣款：固定投入金額（台幣），兩邊各自用「執行當下」的即時價換算成要扣/加多少數量。
// 回傳 true=成功執行、false=價格還沒抓到暫時無法換算（跳過這次，下次補執行時再試）
function applyRecurringOccurrence(rule, from, to) {
  const fromUnitPrice = from.cat==="cash" ? 1 : from.price;
  const toUnitPrice = to.cat==="cash" ? 1 : to.price;
  if (!fromUnitPrice || !toUnitPrice) {
    console.warn(`定期定額 ${rule.id} 因來源或目標尚無即時價格，暫時跳過這次執行`);
    return false;
  }
  const fromDelta = rule.amount_twd / fromUnitPrice;
  const toDelta = rule.amount_twd / toUnitPrice;
  if (from.cat==="cash") from.balance = Math.max(0, (from.balance||0)-fromDelta);
  else from.qty = Math.max(0, +((from.qty||0)-fromDelta).toFixed(8));
  if (to.cat==="cash") to.balance = (to.balance||0)+toDelta;
  else to.qty = +((to.qty||0)+toDelta).toFixed(8);
  return true;
}

// 開 App 時補執行：檢查每條啟用中的規則，把「上次執行日」到「今天」之間錯過的日子都補跑一次。
// 這是方案 A（保險機制）——就算 Vercel Cron 那天沒有成功觸發，開 App 時還是會補上，不會漏掉。
// 每一天的執行都會先呼叫 claimRecurringRule() 原子性搶佔，搶輸（代表 Cron 已經搶先執行過）就跳過不重複扣款。
async function runDueRecurringRules() {
  if (!recurringRules.length) return;
  const today = new Date();
  let anyExecuted = false;

  for (const rule of recurringRules) {
    if (!rule.active) continue;
    const from = assets.find(a=>a.id===rule.from_id);
    const to = assets.find(a=>a.id===rule.to_id);
    if (!from || !to) continue; // 來源或目標資產已刪除，規則失效跳過

    // 價格還沒抓到就不要去搶執行權，避免「搶到了、卻因為換算不出數量而白白浪費這次機會」，
    // 這條規則這次先整條跳過，下次補執行（或明天 Cron）價格應該就有了，會自動重試
    const fromUnitPrice = from.cat==="cash" ? 1 : from.price;
    const toUnitPrice = to.cat==="cash" ? 1 : to.price;
    if (!fromUnitPrice || !toUnitPrice) continue;

    let cursor = rule.last_run_date ? addDays(new Date(rule.last_run_date+"T00:00:00"), 1)
                                     : new Date(rule.created_at || today);
    let safety = 0; // 防呆：最多往前補 400 天，避免規則資料異常時無窮迴圈
    while (cursor <= today && safety < 400) {
      if ((rule.days_of_month||[]).includes(cursor.getDate())) {
        const ds = dateStr(cursor);
        const claimed = await claimRecurringRule(rule, ds);
        if (claimed) {
          applyRecurringOccurrence(rule, from, to); // 上面已確認價格可用，這裡不會失敗
          rule.last_run_date = ds;
          anyExecuted = true;
          await saveAssetToCloud(from);
          await saveAssetToCloud(to);
        } else {
          // 搶輸了：這天其實已經被 Cron（或別的裝置）執行過了，不重複扣款，
          // 只同步本地這條規則的 last_run_date，讓後續判斷繼續往下一天走
          rule.last_run_date = ds;
        }
      }
      cursor = addDays(cursor, 1);
      safety++;
    }
  }

  if (anyExecuted) {
    pushHistory();
    await saveNetWorthSnapshot(netWorth());
  }
}

async function boot() {
  const status=document.getElementById("priceStatus");
  try {
    initSupabase();
    if (cloudOn()) {
      if(status) status.textContent="從雲端載入中…";
      await withTimeout(loadFromCloud(), 15000, "資產載入");
      await withTimeout(loadCategoryLayouts(), 15000, "版面載入");
      await withTimeout(loadRecurringRules(), 15000, "定期定額載入");
      await withTimeout(runDueRecurringRules(), 15000, "定期定額補執行");
      const gotHistory = await withTimeout(loadNetWorthHistory(), 15000, "歷史載入");
      // 雲端還沒有任何歷史點（例如第一次啟用同步）：補記目前這筆，讓折線圖有起點
      if (!gotHistory || history.length===0) {
        pushHistory();
        saveNetWorthSnapshot(netWorth());
      }
    } else {
      pushHistory();
    }
  } catch (e) {
    // 任何未預期錯誤都不讓畫面卡死，改用目前手上有的資料（雲端失敗就用本地預設）繼續開啟
    console.error("開機流程發生錯誤，改用本地資料:", e);
    if (history.length===0) pushHistory();
    if (status) status.textContent = "雲端連線異常，暫用本地資料";
  }
  renderAll(false);
  setTimeout(()=>renderTreemap(),50);
  refreshPrices(true); // 打開就抓一次即時幣價
}
boot();
